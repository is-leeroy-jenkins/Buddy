site_name: Buddy Documentation
site_description: Documentation for Buddy, a federal financial management AI assistant for LLM-enabled analysis, retrieval, prompt management, and data workflows.
site_author: Terry D. Eppler
site_url: https://is-leeroy-jenkins.github.io/Buddy/

repo_url: https://github.com/is-leeroy-jenkins/Buddy
repo_name: is-leeroy-jenkins/Buddy

copyright: Copyright © 2026 Terry D. Eppler

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.tabs.link
  palette:
    - scheme: slate
      primary: blue
      accent: blue
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Architecture: architecture.md
  - User Guide:
      - Overview: user-guide/index.md
      - Chat: user-guide/chat.md
      - Document Q&A: user-guide/document-qna.md
      - Image Generation: user-guide/image-generation.md
      - Audio Processing: user-guide/audio.md
      - Embeddings: user-guide/embeddings.md
      - Vector Stores: user-guide/vector-stores.md
      - Data Management: user-guide/data-management.md
      - Prompt Management: user-guide/prompt-management.md
      - Export & Reporting: user-guide/export-reporting.md
      - Utilities: user-guide/utilities.md
  - API Reference:
      - Overview: api/index.md
      - Application: api/app.md
      - GPT Provider: api/gpt.md
      - Gemini Provider: api/gemini.md
      - Grok Provider: api/grok.md
  - Development: development.md
